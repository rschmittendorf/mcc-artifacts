<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GucciCore — Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --bg-card: #111;
      --gold: #B8962E;
      --gold-light: #D4B96A;
      --cream: #F5F0E8;
      --gray: #888;
      --red: #C0392B;
      --border: #1E1E1E;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 28px 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(8,8,8,0.97);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-left { }
    .header-eyebrow {
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
    }
    .header-title em { font-style: italic; color: var(--gold-light); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .vote-total {
      text-align: right;
    }
    .vote-total-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    .vote-total-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 2px;
    }

    .refresh-btn {
      padding: 12px 28px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--gray);
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
    .refresh-btn.spinning .icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GENDER TABS ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 56px;
    }
    .tab {
      padding: 20px 0;
      margin-right: 48px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--cream); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── CONTENT ── */
    .content {
      padding: 56px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gender-panel { display: none; }
    .gender-panel.active { display: block; }

    .panel-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
    }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 56px;
      font-weight: 300;
      line-height: 0.9;
    }
    .panel-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 10px;
    }

    /* ── RESULTS GRID ── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      margin-bottom: 64px;
    }

    .result-card {
      position: relative;
      background: var(--bg-card);
    }

    .result-img {
      aspect-ratio: 2/3;
      overflow: hidden;
      position: relative;
    }
    .result-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .result-card:hover .result-img img { transform: scale(1.04); }

    /* Rank overlay */
    .rank-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px;
      background: linear-gradient(to bottom, rgba(8,8,8,0.75) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rank-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--gold-light);
      letter-spacing: 2px;
    }
    .rank-num.top3 {
      font-size: 15px;
      color: var(--gold-light);
    }

    .vote-chip {
      background: var(--gold);
      color: var(--bg);
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      letter-spacing: 0.5px;
    }

    /* First place special treatment */
    .result-card.rank-1 .result-img { outline: 1px solid var(--gold); }
    .result-card.rank-1 .vote-chip { background: var(--gold-light); }

    .result-footer {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .result-look {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
    }
    .result-bar-wrap {
      flex: 1;
      margin: 0 12px;
      height: 1px;
      background: var(--border);
      position: relative;
    }
    .result-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--gold);
      transition: width 1s ease;
    }
    .result-pct {
      font-size: 10px;
      color: var(--gray);
      min-width: 32px;
      text-align: right;
    }

    /* ── WORST LOOK ── */
    .worst-section {
      margin-top: 16px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 40px;
    }
    .worst-label-block { min-width: 160px; }
    .worst-eyebrow {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 8px;
    }
    .worst-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: var(--cream);
      line-height: 1.1;
    }
    .worst-card {
      width: 160px;
    }
    .worst-img {
      aspect-ratio: 2/3;
      overflow: hidden;
      outline: 1px solid var(--red);
      position: relative;
    }
    .worst-img img { width: 100%; height: 100%; object-fit: cover; }
    .worst-vote-chip {
      position: absolute;
      bottom: 8px; right: 8px;
      background: var(--red);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
    }
    .worst-look-num {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 8px;
      text-align: center;
    }

    /* ── LOADING / EMPTY ── */
    .loading-state {
      text-align: center;
      padding: 120px 48px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-style: italic;
      color: var(--gray);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 1px solid rgba(184,150,46,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 20px;
    }

    /* ── LAST UPDATED ── */
    .last-updated {
      text-align: center;
      padding: 24px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gray);
      border-top: 1px solid var(--border);
      margin-top: 24px;
    }

    @media (max-width: 1100px) {
      .results-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 860px) {
      .results-grid { grid-template-columns: repeat(3, 1fr); }
      .site-header { padding: 20px 24px; }
      .tabs { padding: 0 24px; }
      .content { padding: 32px 24px; }
    }
    @media (max-width: 600px) {
      .results-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="header-left">
    <div class="header-eyebrow">GucciCore Cruise 2027 · Internal</div>
    <div class="header-title">Team Results<em>.</em></div>
  </div>
  <div class="header-right">
    <div class="vote-total">
      <div class="vote-total-num" id="total-votes">—</div>
      <div class="vote-total-label">votes cast</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadResults()">
      <span class="icon">↻</span>
      <span>Refresh</span>
    </button>
  </div>
</header>

<!-- ── TABS ── -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('w')">Women</div>
  <div class="tab" onclick="switchTab('m')">Men</div>
</div>

<!-- ── CONTENT ── -->
<div class="content">
  <!-- Women -->
  <div class="gender-panel active" id="panel-w">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading results…
    </div>
  </div>
  <!-- Men -->
  <div class="gender-panel" id="panel-m">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading results…
    </div>
  </div>
</div>

<div class="last-updated" id="last-updated"></div>


<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlQJ_IRLMb2ALiE6pBd_beMq0Xk19YHYTCb6grqZCOJvOmWlS20qUFeJYmPnkbv9Jb/exec';

let currentTab = 'w';
let resultsData = null;

// ── TABS ──────────────────────────────────────────────
function switchTab(g) {
  currentTab = g;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && g === 'w') || (i === 1 && g === 'm'));
  });
  document.getElementById('panel-w').classList.toggle('active', g === 'w');
  document.getElementById('panel-m').classList.toggle('active', g === 'm');
}

// ── LOAD ──────────────────────────────────────────────
async function loadResults() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=results', { redirect: 'follow', cache: 'no-store' });
    resultsData = await res.json();
    renderAll(resultsData);
  } catch (e) {
    showError();
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderAll(data) {
  const { totalVotes, wTop3: wTop10, mTop3: mTop10, wWorst, mWorst } = data;

  document.getElementById('total-votes').textContent = totalVotes ?? 0;
  document.getElementById('last-updated').textContent =
    `Last updated: ${new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;

  const maxW = wTop10.length ? wTop10[0].count : 1;
  const maxM = mTop10.length ? mTop10[0].count : 1;

  renderPanel('w', wTop10, wWorst, maxW, totalVotes);
  renderPanel('m', mTop10, mWorst, maxM, totalVotes);
}

function renderPanel(g, topList, worst, maxVotes, totalVotes) {
  const dir   = g === 'w' ? 'W' : 'M';
  const label = g === 'w' ? 'Women' : 'Men';
  const panel = document.getElementById(`panel-${g}`);

  if (!topList || topList.length === 0) {
    panel.innerHTML = `
      <div class="loading-state" style="padding:80px">
        <p style="font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--gray)">
          No votes yet.
        </p>
      </div>`;
    return;
  }

  const rankLabel = i => {
    const n = i + 1;
    if (n === 1) return '1st';
    if (n === 2) return '2nd';
    if (n === 3) return '3rd';
    return `${n}th`;
  };

  const cardsHTML = topList.map((item, i) => {
    const pct = totalVotes > 0 ? Math.round((item.count / totalVotes) * 100) : 0;
    const barW = maxVotes > 0 ? Math.round((item.count / maxVotes) * 100) : 0;
    const isTop3 = i < 3;
    return `
      <div class="result-card ${i === 0 ? 'rank-1' : ''}">
        <div class="result-img">
          <img src="Pics/${dir}/GG_Cruise_VOGUE_Look_${item.look}.jpg" alt="Look ${item.look}" loading="lazy">
          <div class="rank-overlay">
            <span class="rank-num ${isTop3 ? 'top3' : ''}">${rankLabel(i)}</span>
            <span class="vote-chip">${item.count} ${item.count === 1 ? 'vote' : 'votes'}</span>
          </div>
        </div>
        <div class="result-footer">
          <span class="result-look">Look ${item.look}</span>
          <div class="result-bar-wrap">
            <div class="result-bar" style="width:${barW}%"></div>
          </div>
          <span class="result-pct">${pct}%</span>
        </div>
      </div>`;
  }).join('');

  const worstHTML = worst ? `
    <div class="worst-section">
      <div class="worst-label-block">
        <div class="worst-eyebrow">Least Favorite</div>
        <div class="worst-title">The Team's<br>Worst Look</div>
      </div>
      <div class="worst-card">
        <div class="worst-img">
          <img src="Pics/${dir}/GG_Cruise_VOGUE_Look_${worst.look}.jpg" alt="Look ${worst.look}">
          <div class="worst-vote-chip">${worst.count} ${worst.count === 1 ? 'vote' : 'votes'}</div>
        </div>
        <div class="worst-look-num">Look ${worst.look}</div>
      </div>
    </div>` : '';

  panel.innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-title">${label}'s<br>Top ${topList.length}</div>
        <div class="panel-sub">Ranked by team vote · ${totalVotes} ${totalVotes === 1 ? 'voter' : 'voters'}</div>
      </div>
    </div>
    <div class="results-grid">${cardsHTML}</div>
    ${worstHTML}
  `;
}

function showError() {
  ['w', 'm'].forEach(g => {
    document.getElementById(`panel-${g}`).innerHTML = `
      <div class="loading-state">
        <p style="color:var(--red)">Could not load results. Check your Apps Script deployment.</p>
      </div>`;
  });
}

// ── AUTO REFRESH every 60s ───────────────────────────
loadResults();
setInterval(loadResults, 60000);
</script>
</body>
</html>
